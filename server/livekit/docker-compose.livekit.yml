version: "3.9"

services:
  livekit:
    image: livekit/livekit-server
    ports:
      - "7880:7880"   # HTTP/WS
      - "7881:7881"   # RTC TCP
      - "50000-50100:50000-50100/udp"  # WebRTC UDP
    volumes:
      - ./livekit-config.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml --dev
    restart: unless-stopped
