# fly.toml app configuration file generated for pe-portal-office on 2026-02-27T21:24:11+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pe-portal-office'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
